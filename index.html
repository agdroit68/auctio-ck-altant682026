// ─── Montant en toutes lettres (français) ───
function enLettres(n) {
  n = Math.floor(Math.abs(n));
  if (n === 0) return 'Zéro';
  const u = ['', 'un', 'deux', 'trois', 'quatre', 'cinq', 'six', 'sept', 'huit', 'neuf', 'dix', 'onze', 'douze', 'treize', 'quatorze', 'quinze', 'seize', 'dix-sept', 'dix-huit', 'dix-neuf'];
  const d = ['', '', 'vingt', 'trente', 'quarante', 'cinquante', 'soixante', 'soixante', 'quatre-vingt', 'quatre-vingt'];
  function centaines(x) {
    let s = ''; const c = Math.floor(x / 100), r = x % 100;
    if (c) s = (c > 1 ? u[c] + ' ' : '') + 'cent' + (c > 1 && r === 0 ? 's' : '');
    if (r) {
      if (s) s += ' ';
      if (r < 20) s += u[r];
      else {
        const dz = Math.floor(r / 10), un = r % 10;
        if (dz === 7 || dz === 9) { const base = d[dz], reste = r - (dz === 7 ? 60 : 80); s += base + (reste === 11 && dz === 7 ? ' et ' : '-') + u[reste]; if (dz === 7 && reste === 11) s = s.replace('-onze', 'onze'); }
        else { s += d[dz]; if (un === 1 && dz !== 8) s += ' et un'; else if (un) s += '-' + u[un]; else if (dz === 8) s += 's'; }
      }
    }
    return s;
  }
  let mots = '';
  const millions = Math.floor(n / 1000000), milliers = Math.floor((n % 1000000) / 1000), reste = n % 1000;
  if (millions) mots += centaines(millions) + ' million' + (millions > 1 ? 's' : '');
  if (milliers) mots += (mots ? ' ' : '') + (milliers === 1 ? 'mille' : centaines(milliers) + ' mille');
  if (reste) mots += (mots ? ' ' : '') + centaines(reste);
  mots = mots.replace(/quatre-vingts mille/, 'quatre-vingt mille').replace(/cents mille/, 'cent mille');
  return mots.charAt(0).toUpperCase() + mots.slice(1);
}
function montantEnLettres(m) {
  const ent = Math.floor(m), cents = Math.round((m - ent) * 100);
  if (!cents) return enLettres(ent);
  return enLettres(ent) + ' euros ' + enLettres(cents).toLowerCase() + ' centimes';
}

// ════════════════════════════════════════════════════════════════════
//  GÉNÉRATION DU PV (Excel — format compatible import Auctio PC)
// ════════════════════════════════════════════════════════════════════
//  Chargement d'images en base64 (logo, sceau) pour les documents générés
// ════════════════════════════════════════════════════════════════════
const _imgCache = {};
async function imageBase64(src) {
  if (_imgCache[src]) return _imgCache[src];
  // 1) tentative via fetch (fonctionne en https / PWA installée)
  try {
    const rep = await fetch(src);
    if (rep.ok) {
      const blob = await rep.blob();
      _imgCache[src] = await new Promise((res) => { const r = new FileReader(); r.onload = () => res(r.result); r.readAsDataURL(blob); });
      return _imgCache[src];
    }
  } catch (e) {}
  // 2) repli : charger l'image et la passer par un canvas
  try {
    _imgCache[src] = await new Promise((res, rej) => {
      const img = new Image();
      img.crossOrigin = 'anonymous';
      img.onload = () => {
        const c = document.createElement('canvas'); c.width = img.naturalWidth; c.height = img.naturalHeight;
        c.getContext('2d').drawImage(img, 0, 0);
        try { res(c.toDataURL('image/png')); } catch (e) { rej(e); }
      };
      img.onerror = rej;
      img.src = src;
    });
    return _imgCache[src];
  } catch (e) { return null; }
}
function logoBase64() { return imageBase64('logo-etude.png'); }
function sceauBase64() { return imageBase64('sceau-etude.png'); }

// ════════════════════════════════════════════════════════════════════
//  PROCÈS-VERBAL DE VENTE (Excel) — reproduction exacte du modèle de l'étude
//  Colonnes : N° d'ordre (= n° de lot) · Désignation · Nom et adresse ·
//  Prix en toutes lettres / en chiffres. Bloc TVA/HT/TTC calculé.
//  Sceau de l'étude sous « COMMISSAIRE DE JUSTICE ». Pas de logo en tête.
// ════════════════════════════════════════════════════════════════════
async function genererPV() {
  const v = vente();
  const vendus = v.adjudications.filter(a => !a.invendu);
  if (!vendus.length) { toast('Aucun lot adjugé — rien à mettre au PV.'); return; }
  const lignes = vendus.slice().sort((a, b) => (parseInt(a.lot) || 0) - (parseInt(b.lot) || 0));
  // Garde-fou : ExcelJS absent (fichier exceljs.min.js manquant sur le site)
  if (typeof ExcelJS === 'undefined') {
    toast('exceljs.min.js manquant sur le site — PV généré en version simple.');
    return genererPVSimple(v, lignes);
  }
  toast('Génération du procès-verbal…');
  const buf = await construirePVExcel(v, lignes);
  const nomFichier = 'Procès-verbal de vente du ' + dateFR(v.date).replace(/\//g, '_') + '.xlsx';
  partagerFichier(new Blob([buf], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' }), nomFichier);
}
// Construit le classeur du PV (retourne le contenu .xlsx) — utilisé par le
// bouton PV et par l'export complet de la vente
async function construirePVExcel(v, lignes) {
  const wb = new ExcelJS.Workbook();
  const ws = wb.addWorksheet('Feuil1', { pageSetup: { paperSize: 9, orientation: 'portrait', fitToPage: true, fitToWidth: 1, fitToHeight: 0, margins: { left: 0.47, right: 0.47, top: 0.52, bottom: 0.52, header: 0.3, footer: 0.3 } } });
  // Largeurs exactes du modèle
  ws.columns = [{ width: 8.5 }, { width: 30 }, { width: 30 }, { width: 30 }, { width: 14 }];

  const M = { style: 'medium' }, T = { style: 'thin' };
  const AR = (sz, o) => Object.assign({ name: 'Arial', size: sz }, o || {});
  const CC = { horizontal: 'center', vertical: 'center' };

  // ── En-tête du tableau (2 lignes, fusions verticales comme le modèle) ──
  ws.mergeCells('A1:A2'); ws.mergeCells('B1:B2'); ws.mergeCells('C1:C2'); ws.mergeCells('D1:E1');
  ws.getCell('A1').value = "N° d'ordre";
  ws.getCell('B1').value = "Désignation de l'objet à vendre";
  ws.getCell('C1').value = "Nom et adresse de l'acheteur";
  ws.getCell('D1').value = 'Prix de vente en Euros';
  ws.getCell('D2').value = 'En toutes lettres';
  ws.getCell('E2').value = 'En chiffres';
  ['A1', 'B1', 'C1', 'D1', 'D2', 'E2'].forEach(ref => {
    const c = ws.getCell(ref); c.font = AR(11, { bold: true });
    c.alignment = Object.assign({}, CC, { wrapText: ref === 'A1' });
    c.border = { top: M, bottom: M, left: M, right: M };
  });
  ws.getRow(1).height = 26; ws.getRow(2).height = 26;

  // ── Corps : une ligne par lot adjugé ──
  let r = 3; const first = r;
  lignes.forEach(a => {
    const f = v.acheteurs[String(a.adjNum || a.adj)] || {};
    const adrParts = [f.adresse, [f.cp, f.ville].filter(Boolean).join(' ')].filter(Boolean).join(' ');
    const nomAdresse = f.nom ? (f.nom + (adrParts ? ', ' + adrParts : '')) : '';
    ws.getCell(`A${r}`).value = parseInt(a.lot, 10) || a.lot;      // N° d'ordre = n° de lot
    ws.getCell(`B${r}`).value = a.designation || '';
    ws.getCell(`C${r}`).value = nomAdresse;
    ws.getCell(`D${r}`).value = montantEnLettres(a.montant);
    ws.getCell(`E${r}`).value = a.montant;
    // polices du modèle : A/D/E Arial 10, B Arial 9, C Arial 8
    ws.getCell(`A${r}`).font = AR(12); ws.getCell(`B${r}`).font = AR(11);
    ws.getCell(`C${r}`).font = AR(10); ws.getCell(`D${r}`).font = AR(12); ws.getCell(`E${r}`).font = AR(12);
    for (let c = 1; c <= 5; c++) {
      const cell = ws.getCell(r, c);
      cell.alignment = Object.assign({}, CC, { wrapText: c !== 5 });
      cell.border = { left: M, right: M, top: T, bottom: T };
    }
    ws.getRow(r).height = 32; r++;
  });
  const last = r - 1;

  // ── TOTAL ──
  ws.getCell(`D${r}`).value = 'TOTAL'; ws.getCell(`D${r}`).font = AR(12, { bold: true }); ws.getCell(`D${r}`).alignment = CC;
  ws.getCell(`E${r}`).value = { formula: `SUM(E${first}:E${last})` }; ws.getCell(`E${r}`).font = AR(12, { bold: true }); ws.getCell(`E${r}`).alignment = CC;
  ['A', 'B', 'C', 'D', 'E'].forEach(col => { ws.getCell(`${col}${r}`).border = { top: T, bottom: M, left: M, right: M }; });
  const rTotal = r; ws.getRow(r).height = 30;

  // ── Mention TVA + bloc calculs (espacements relatifs du modèle) ──
  const rMention = rTotal + 10;
  ws.mergeCells(`B${rMention}:C${rMention}`);
  ws.getCell(`B${rMention}`).value = 'Il est précisé que la TVA sera payée ultérieurement.';
  ws.getCell(`B${rMention}`).font = AR(11); ws.getCell(`B${rMention}`).alignment = CC;

  const rHT = rTotal + 12, rTVA1 = rHT + 1, rBase = rHT + 2, rFrais = rHT + 3, rTVA2 = rHT + 4, rTTC = rHT + 5;
  const put = (row, label, val) => {
    ws.getCell(`B${row}`).value = label; ws.getCell(`B${row}`).font = AR(11); ws.getCell(`B${row}`).alignment = CC;
    ws.getCell(`C${row}`).value = val; ws.getCell(`C${row}`).font = AR(11); ws.getCell(`C${row}`).alignment = CC;
    ws.getCell(`C${row}`).numFmt = '#,##0.00';
  };
  put(rHT, 'PRODUIT VENTE HT', { formula: `C${rBase}/1.2` });
  put(rTVA1, 'TVA 20 %', { formula: `C${rHT}*0.2` });
  // la base = total des adjudications (liée au TOTAL du tableau)
  ws.getCell(`C${rBase}`).value = { formula: `E${rTotal}` };
  ws.getCell(`C${rBase}`).font = AR(11); ws.getCell(`C${rBase}`).alignment = CC; ws.getCell(`C${rBase}`).numFmt = '#,##0.00';
  put(rFrais, 'FRAIS HT', { formula: `(C${rTTC}-C${rBase})/1.2` });
  put(rTVA2, 'TVA 20 %', { formula: `C${rFrais}*0.2` });
  put(rTTC, 'TOTAL TTC', { formula: `C${rBase}*1.1428` });

  // ── DONT ACTE + phrase + COMMISSAIRE DE JUSTICE + sceau ──
  const rActe = rTotal + 19;
  ws.mergeCells(`B${rActe}:C${rActe}`);
  ws.getCell(`B${rActe}`).value = 'DONT ACTE - SOUS TOUTES RESERVES';
  ws.getCell(`B${rActe}`).font = AR(11); ws.getCell(`B${rActe}`).alignment = CC;

  const rPhrase = rTotal + 21;
  ws.mergeCells(`A${rPhrase}:E${rPhrase}`);
  ws.getCell(`A${rPhrase}`).value = "Que j'ai seul signé, les acquéreurs ayant quitté les lieux avant la clôture du présent procès - verbal.";
  ws.getCell(`A${rPhrase}`).font = AR(11); ws.getCell(`A${rPhrase}`).alignment = Object.assign({}, CC, { wrapText: true });

  const rComm = rTotal + 24;
  ws.getCell(`D${rComm}`).value = 'COMMISSAIRE DE JUSTICE';
  ws.getCell(`D${rComm}`).font = AR(11); ws.getCell(`D${rComm}`).alignment = CC;

  // Sceau de l'étude sous « COMMISSAIRE DE JUSTICE »
  const sceau = await sceauBase64();
  if (sceau) {
    const imgId = wb.addImage({ base64: sceau, extension: 'png' });
    ws.addImage(imgId, { tl: { col: 3.15, row: rComm + 0.4 }, ext: { width: 105, height: 105 } });
  }

  return wb.xlsx.writeBuffer();
}

// ─── PV de secours (SheetJS, sans mise en forme — utilisé seulement si exceljs.min.js manque) ───
function genererPVSimple(v, lignes) {
  const total = lignes.reduce((s, a) => s + a.montant, 0);
  const aoa = [];
  aoa.push(["N° d'ordre", "Désignation de l'objet à vendre", "Nom et adresse de l'acheteur", 'Prix de vente en Euros', '']);
  aoa.push(['', '', '', 'En toutes lettres', 'En chiffres']);
  lignes.forEach(a => {
    const f = v.acheteurs[String(a.adjNum || a.adj)] || {};
    const adrParts = [f.adresse, [f.cp, f.ville].filter(Boolean).join(' ')].filter(Boolean).join(' ');
    const nomAdresse = f.nom ? (f.nom + (adrParts ? ', ' + adrParts : '')) : '';
    aoa.push([parseInt(a.lot, 10) || a.lot, a.designation || '', nomAdresse, montantEnLettres(a.montant), a.montant]);
  });
  aoa.push(['', '', '', 'TOTAL', total]);
  const ws = XLSX.utils.aoa_to_sheet(aoa);
  ws['!cols'] = [{ wch: 7 }, { wch: 26 }, { wch: 26 }, { wch: 26 }, { wch: 11 }];
  const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, 'Feuil1');
  const data = XLSX.write(wb, { type: 'array', bookType: 'xlsx' });
  partagerFichier(new Blob([data], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' }), 'Procès-verbal de vente du ' + dateFR(v.date).replace(/\//g, '_') + '.xlsx');
}

// ════════════════════════════════════════════════════════════════════
//  PROCÈS-VERBAL DE VENTE ÉCRIT (Word / PDF) — reproduction du modèle
//  avec variables : année/jour en lettres, mandataire, commissaire
//  (accord masculin/féminin), lieu, nature, date de publication.
// ════════════════════════════════════════════════════════════════════
const JOURS_SEMAINE = ['Dimanche', 'Lundi', 'Mardi', 'Mercredi', 'Jeudi', 'Vendredi', 'Samedi'];
const MOIS_FR = ['janvier', 'février', 'mars', 'avril', 'mai', 'juin', 'juillet', 'août', 'septembre', 'octobre', 'novembre', 'décembre'];
function majChaqueMot(s) { return s.split(/[\s-]+/).map(m => m.charAt(0).toUpperCase() + m.slice(1)).join(' '); }
// "L'an Deux Mil Vingt Six et le Sept (07) Juillet"
function anEtJourEnLettres(iso) {
  const [y, m, d] = iso.split('-').map(Number);
  const annee = 'Deux Mil' + (y % 2000 ? ' ' + majChaqueMot(enLettres(y % 2000).toLowerCase()) : '');
  const jour = majChaqueMot(enLettres(d).toLowerCase()) + ' (' + String(d).padStart(2, '0') + ')';
  const mois = majChaqueMot(MOIS_FR[m - 1]);
  return `L'an ${annee} et le ${jour} ${mois}`;
}
// "Mardi 7 juillet 2026"
function dateLonguePV(iso) {
  if (!iso) return '';
  const [y, m, d] = iso.split('-').map(Number);
  const dt = new Date(y, m - 1, d);
  return `${JOURS_SEMAINE[dt.getDay()]} ${d} ${MOIS_FR[m - 1]} ${y}`;
}
// accord de la nature : "du matériel" / "des véhicules" / "du [libre]"
function natureAccordee(nature) {
  const n = (nature || 'matériel').toLowerCase();
  if (n.indexOf('véhicule') !== -1) return 'des véhicules ci-après désignés';
  if (n === 'matériel' || n === 'materiel') return 'du matériel ci-après désignés';
  return 'de ' + (nature || '') + ' ci-après désignés';
}

// ─── Outils zip (mode "store", 100 % autonome) pour produire un vrai .docx ───
const CRC_TABLE = (() => {
  const t = new Uint32Array(256);
  for (let n = 0; n < 256; n++) { let c = n; for (let k = 0; k < 8; k++) c = c & 1 ? 0xEDB88320 ^ (c >>> 1) : c >>> 1; t[n] = c >>> 0; }
  return t;
})();
function crc32(u8) {
  let c = 0xFFFFFFFF;
  for (let i = 0; i < u8.length; i++) c = CRC_TABLE[(c ^ u8[i]) & 0xFF] ^ (c >>> 8);
  return (c ^ 0xFFFFFFFF) >>> 0;
}
function b64versOctets(b64) {
  const bin = atob(b64);
  const u8 = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) u8[i] = bin.charCodeAt(i);
  return u8;
}
function construireZip(entrees) {
  const enc = new TextEncoder();
  const morceaux = []; const centraux = [];
  let offset = 0;
  const u16 = (v) => new Uint8Array([v & 255, (v >> 8) & 255]);
  const u32 = (v) => new Uint8Array([v & 255, (v >> 8) & 255, (v >> 16) & 255, (v >> 24) & 255]);
  for (const e of entrees) {
    const nom = enc.encode(e.nom);
    const crc = crc32(e.data);
    const local = [u32(0x04034b50), u16(20), u16(0x0800), u16(0), u16(0), u16(0), u32(crc), u32(e.data.length), u32(e.data.length), u16(nom.length), u16(0)];
    morceaux.push(...local, nom, e.data);
    centraux.push({ nom, crc, taille: e.data.length, offset });
    offset += local.reduce((s, a) => s + a.length, 0) + nom.length + e.data.length;
  }
  const debutCentral = offset;
  for (const c of centraux) {
    morceaux.push(u32(0x02014b50), u16(20), u16(20), u16(0x0800), u16(0), u16(0), u16(0), u32(c.crc), u32(c.taille), u32(c.taille), u16(c.nom.length), u16(0), u16(0), u16(0), u16(0), u32(0), u32(c.offset), c.nom);
    offset += 46 + c.nom.length;
  }
  morceaux.push(u32(0x06054b50), u16(0), u16(0), u16(centraux.length), u16(centraux.length), u32(offset - debutCentral), u32(debutCentral), u16(0));
  let total = 0; for (const m of morceaux) total += m.length;
  const zip = new Uint8Array(total); let pos = 0;
  for (const m of morceaux) { zip.set(m, pos); pos += m.length; }
  return zip;
}
function escXml(s) { return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/\'/g, '&apos;'); }

// ─── Génère le .docx du PV écrit : le fichier modèle de l\'étude, variables remplacées ───
function genererDocxPV(valeurs) {
  const dec = new TextDecoder('utf-8');
  const enc = new TextEncoder();
  const entrees = [];
  for (const nom of Object.keys(PV_DOCX_TEMPLATE)) {
    let data = b64versOctets(PV_DOCX_TEMPLATE[nom]);
    if (nom === 'word/document.xml') {
      let xml = dec.decode(data);
      for (const cle of Object.keys(valeurs)) xml = xml.split('{{' + cle + '}}').join(escXml(valeurs[cle]));
      data = enc.encode(xml);
    }
    entrees.push({ nom, data });
  }
  return construireZip(entrees);
}

// Valeurs des variables du PV écrit pour une vente
function valeursDocxPV(v) {
  const estFemme = /KESSER/i.test(v.commissaire || '');
  return {
    AN_JOUR: anEtJourEnLettres(v.date).replace(/^L'an /, ''),
    DATE_COURTE: dateFR(v.date),
    REQUETE: texteRequete(v),
    SOUSSIGNE: estFemme ? 'Je soussignée' : 'Je soussigné',
    COMMISSAIRE: (v.commissaire || '').replace(/^Me\s+/i, 'Maître '),
    TRANSPORTE: estFemme ? 'transportée' : 'transporté',
    DATE_LONGUE: dateLonguePV(v.date),
    LIEU: v.lieu || '',
    NATURE: natureAccordee(v.nature),
    PUBLICATION: v.datePublication ? dateLonguePV(v.datePublication) : '',
  };
}
// Export Word : le fichier modèle de l'étude (.docx), variables remplacées —
// cadre, retraits, points de suite et numérotation 1-7 natifs Word.
function exporterPVEcritWord() {
  const v = vente();
  if (!v.date) { toast('La vente n\'a pas de date.'); return; }
  toast('Génération du PV écrit (Word)…');
  const zip = genererDocxPV(valeursDocxPV(v));
  const blob = new Blob([zip], { type: 'application/vnd.openxmlformats-officedocument.wordprocessingml.document' });
  partagerFichier(blob, 'Procès-verbal de vente du ' + dateFR(v.date).replace(/\//g, '_') + '.docx');
}

async function exporterLotsXLSX() {
  const v = vente();

    return;
  }

  const buf = await construireFicheLots(v);
  partagerFichier(new Blob([buf], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' }), 'Fiche des lots - ' + (v.nom || 'vente').replace(/[^\w-]/g, '_') + '.xlsx');
}
// Construit le classeur de la fiche des lots (retourne le contenu .xlsx)
async function construireFicheLots(v) {
  const lots = v.lots.slice().sort((a, b) => (parseInt(a.num) || 0) - (parseInt(b.num) || 0));

  const wb = new ExcelJS.Workbook();
  const ws = wb.addWorksheet('Lots');
  ws.columns = [{ width: 10 }, { width: 50 }, { width: 26 }];
  const M = { style: 'medium' }, T = { style: 'thin' }, AR = (o) => Object.assign({ name: 'Arial', size: 10 }, o || {});

  // Titre
  ws.mergeCells('A1:C1');
  ws.getCell('A1').value = 'Fiche des lots — ' + v.nom + ' (' + dateFR(v.date) + ')';
  ws.getCell('A1').font = AR({ size: 12, bold: true }); ws.getCell('A1').alignment = { horizontal: 'left', vertical: 'center' };
  ws.getRow(1).height = 22;
  // En-têtes
  const H = 3;
  ['N° de lot', 'Libellé', 'Photo'].forEach((t, i) => {
    const c = ws.getCell(H, i + 1); c.value = t; c.font = AR({ bold: true });
    c.alignment = { horizontal: 'center', vertical: 'center' }; c.border = { top: M, bottom: M, left: M, right: M };
  });
  ws.getRow(H).height = 18;

  // Lignes + images
  let r = H + 1;
  for (const l of lots) {
    ws.getCell(`A${r}`).value = parseInt(l.num, 10) || l.num;
    ws.getCell(`B${r}`).value = l.libelle;
    [1, 2, 3].forEach(c => { const cell = ws.getCell(r, c); cell.font = AR(); cell.alignment = { horizontal: c === 2 ? 'left' : 'center', vertical: 'center', wrapText: c === 2 }; cell.border = { top: T, bottom: T, left: M, right: M }; });
    let h = 20;
    if (l.photoId) {
      const d = await photoGet(l.photoId);
      if (d) {
        try {
          const ext = d.indexOf('image/png') !== -1 ? 'png' : 'jpeg';
          const imgId = wb.addImage({ base64: d, extension: ext });
          // image dans la colonne C (index 2), avec petite marge
          ws.addImage(imgId, { tl: { col: 2.1, row: r - 1 + 0.1 }, ext: { width: 150, height: 110 } });
          h = 90;
        } catch (e) {}
      }
    }
    ws.getRow(r).height = h;
    r++;
  }
  return wb.xlsx.writeBuffer();
}

//  EXPORT COMPLET DE LA VENTE — un seul fichier .zip à envoyer par mail :

//  (vente.json = données intégrales, lues par « Importer une vente »
//  d'Auctio PC ; zip non compressé → lisible sans bibliothèque)
// ════════════════════════════════════════════════════════════════════
async function exporterVenteComplete() {
  const v = vente();
  if (!v.adjudications.length && !v.lots.length) { toast('Rien à exporter : aucune adjudication ni lot.'); return; }
  if (typeof ExcelJS === 'undefined') { toast('exceljs.min.js manquant sur le site — export complet impossible.'); return; }
  toast('Préparation de l\'export complet…');

  const enc = new TextEncoder();
  const entrees = [];
  const nomBase = 'Procès-verbal de vente du ' + dateFR(v.date).replace(/\//g, '_');

  // 1) PV Excel (s'il y a des lots adjugés)
  const vendus = v.adjudications.filter(a => !a.invendu);
  const lignes = vendus.slice().sort((a, b) => (parseInt(a.lot) || 0) - (parseInt(b.lot) || 0));
  if (lignes.length) {
    const bufPV = await construirePVExcel(v, lignes);
    entrees.push({ nom: nomBase + '.xlsx', data: new Uint8Array(bufPV) });
  }
  // 2) PV écrit Word
  if (v.date) entrees.push({ nom: nomBase + '.docx', data: genererDocxPV(valeursDocxPV(v)) });
  // 3) Fiche des lots + photos
  const photosJson = {};
  if (v.lots.length) {
    const bufLots = await construireFicheLots(v);
    entrees.push({ nom: 'Fiche des lots.xlsx', data: new Uint8Array(bufLots) });
    for (const l of v.lots) {
      if (!l.photoId) continue;
      const d = await photoGet(l.photoId);
      if (!d) continue;
      const virgule = d.indexOf(',');
      const ext = d.indexOf('image/png') !== -1 ? 'png' : 'jpg';
      const chemin = 'photos/lot_' + String(l.num).replace(/[^\w-]/g, '_') + '.' + ext;
      entrees.push({ nom: chemin, data: b64versOctets(d.slice(virgule + 1)) });
      photosJson[String(l.num)] = chemin;
    }
  }
  // 4) vente.json — données intégrales pour l'import Auctio PC
  const donnees = {
    app: 'auctio-mobile', type: 'export-vente', version: 1,
    exporteLe: new Date().toISOString(),
    vente: {
      nom: v.nom, date: v.date, heure: v.heure || '', lieu: v.lieu || '',
      nature: v.nature || '', commissaire: v.commissaire || '',
      societe: v.societe || {}, mandataireNom: v.mandataireNom || '',
      texteRequete: texteRequete(v), datePublication: v.datePublication || '',
      adjudications: v.adjudications.map(a => ({ lot: a.lot, designation: a.designation || '', adjNum: a.adjNum || a.adj, montant: a.montant, invendu: !!a.invendu })),
      acheteurs: v.acheteurs || {},
      lots: v.lots.map(l => ({ num: l.num, libelle: l.libelle, photo: photosJson[String(l.num)] || null })),
      total: lignes.reduce((s, a) => s + a.montant, 0),
    },
  };
  entrees.push({ nom: 'vente.json', data: enc.encode(JSON.stringify(donnees, null, 2)) });

  const zip = construireZip(entrees);
  const nomZip = 'Vente ' + (v.nom || 'sans nom').replace(/[^\w \u00C0-\u017F-]/g, '') + ' du ' + dateFR(v.date).replace(/\//g, '_') + '.zip';
  partagerFichier(new Blob([zip], { type: 'application/zip' }), nomZip);
}

// Impression via iframe cachée (pas de popup bloquée par Safari)
function imprimerHTML(html) {
  const ancienne = document.getElementById('iframe-print');
  if (ancienne) ancienne.remove();
  const ifr = document.createElement('iframe');
  ifr.id = 'iframe-print';
  ifr.style.cssText = 'position:fixed;right:0;bottom:0;width:0;height:0;border:0;';
  document.body.appendChild(ifr);
  const doc = ifr.contentWindow.document;
  doc.open(); doc.write(html); doc.close();
  const lancer = () => {
    try { ifr.contentWindow.focus(); ifr.contentWindow.print(); }
    catch (e) { toast('Impression indisponible sur cet appareil.'); }
  };
  // laisser le temps aux images de se charger
  if (ifr.contentWindow.document.readyState === 'complete') setTimeout(lancer, 400);
  else ifr.onload = () => setTimeout(lancer, 400);
}

// ─── Export : tableau des enregistrements (.xlsx) ───
function exporterEnregistrementsXLSX() {
  const v = vente();
  const lignes = v.adjudications.slice().sort((a, b) => (parseInt(a.lot) || 0) - (parseInt(b.lot) || 0));
  if (!lignes.length) { toast('Aucun enregistrement.'); return; }
  const aoa = [['Enregistrements — ' + v.nom + ' (' + dateFR(v.date) + ')'], [], ['Lot', 'Désignation', 'N° adj.', 'Adjudicataire', 'Montant', 'Statut']];
  lignes.forEach(a => { const f = v.acheteurs[String(a.adjNum || a.adj)] || {}; aoa.push([parseInt(a.lot) || a.lot, a.designation || '', parseInt(a.adjNum || a.adj) || (a.adjNum || a.adj), f.nom || '', a.invendu ? '' : a.montant, a.invendu ? 'Invendu' : 'Adjugé']); });
  const ws = XLSX.utils.aoa_to_sheet(aoa);
  ws['!cols'] = [{ wch: 8 }, { wch: 40 }, { wch: 9 }, { wch: 30 }, { wch: 12 }, { wch: 10 }];
  const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, 'Enregistrements');
  const data = XLSX.write(wb, { type: 'array', bookType: 'xlsx' });
  partagerFichier(new Blob([data], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' }), 'Enregistrements - ' + (v.nom || 'vente').replace(/[^\w-]/g, '_') + '.xlsx');
}

// ─── Export : fiche adjudicataires de la vente (.xlsx) ───
function exporterAdjVente() {
  const v = vente();
  const nums = numerosAcheteurs(v);
  if (!nums.length) { toast('Aucun adjudicataire.'); return; }
  const aoa = [['Adjudicataires — ' + v.nom + ' (' + dateFR(v.date) + ')'], [], ['N° adj.', 'Nom', 'Adresse', 'CP', 'Ville', 'Lots', 'Total', 'Réglé', 'Mode']];
  nums.forEach(n => {
    const f = v.acheteurs[n] || {};
    const lots = v.adjudications.filter(a => !a.invendu && String(a.adjNum || a.adj) === n);
    const tot = lots.reduce((s, a) => s + a.montant, 0);
    aoa.push([parseInt(n) || n, f.nom || '', f.adresse || '', f.cp || '', f.ville || '', lots.length, tot, f.regle ? 'Oui' : 'Non', f.mode || '']);
  });
  const ws = XLSX.utils.aoa_to_sheet(aoa);
  ws['!cols'] = [{ wch: 8 }, { wch: 28 }, { wch: 32 }, { wch: 8 }, { wch: 20 }, { wch: 7 }, { wch: 12 }, { wch: 8 }, { wch: 8 }];
  const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, 'Adjudicataires');
  const data = XLSX.write(wb, { type: 'array', bookType: 'xlsx' });
  partagerFichier(new Blob([data], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' }), 'Adjudicataires - ' + (v.nom || 'vente').replace(/[^\w-]/g, '_') + '.xlsx');
}

// ─── Export : carnet général des adjudicataires (.xlsx) ───
function exporterCarnet() {
  if (!etat.carnet.length) { toast('Le carnet est vide.'); return; }
  const aoa = [['Carnet général des adjudicataires — Étude Copi & Kesser'], [], ['Nom', 'Prénom', 'Adresse', 'CP', 'Ville', 'E-mail', 'Téléphone']];
  etat.carnet.slice().sort((a, b) => carnetLabel(a).localeCompare(carnetLabel(b))).forEach(c => aoa.push([c.nom || '', c.prenom || '', c.adresse || '', c.cp || '', c.ville || '', c.mail || '', c.tel || '']));
  const ws = XLSX.utils.aoa_to_sheet(aoa);
  ws['!cols'] = [{ wch: 24 }, { wch: 18 }, { wch: 34 }, { wch: 8 }, { wch: 20 }, { wch: 26 }, { wch: 16 }];
  const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, 'Carnet');
  const data = XLSX.write(wb, { type: 'array', bookType: 'xlsx' });
  partagerFichier(new Blob([data], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' }), 'Carnet adjudicataires.xlsx');
}

// ─── Sauvegarde d'urgence (.json) ───
function exporterSecours() {
  const v = vente();
  const blob = new Blob([JSON.stringify(v, null, 1)], { type: 'application/json' });
  partagerFichier(blob, 'Auctio-vente-' + (v.nom || 'x').replace(/[^\w-]/g, '_') + '.json');
}

// ─── Partage via la feuille iOS (Mail…) — repli : téléchargement ───
async function partagerFichier(blob, nom) {
  try {
    const fichier = new File([blob], nom, { type: blob.type });
    if (navigator.canShare && navigator.canShare({ files: [fichier] })) {
      await navigator.share({ files: [fichier], title: nom });
      toast('Fichier prêt — choisissez Mail dans le partage.');
      return;
    }
  } catch (e) { if (e && e.name === 'AbortError') return; }
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = nom;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(() => URL.revokeObjectURL(url), 4000);
  toast('Fichier téléchargé.');
}
